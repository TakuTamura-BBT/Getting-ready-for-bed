<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おやすみのじゅんびアプリ</title>
    <style>
        :root {
            /* ディズニーの夜空をイメージした深いロイヤルブルーと紫のグラデーション */
            --bg-gradient: linear-gradient(135deg, #101535 0%, #2a1b4e 50%, #461e57 100%);
            --card-bg: rgba(255, 255, 255, 0.12);
            --text-color: #ffffff;
            --accent-color: #fbd249; /* ピクシーダストのようなゴールド */
            --success-color: #a8e6cf;
            --danger-color: #ff7675;
            --timer-blue: #3867d6; /* 添付画像に近い鮮やかなブルー */
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ディズニーっぽいお城の背景シルエット（CSSアート） */
        body::before {
            content: "";
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 800px;
            height: 220px;
            background: 
                /* 中央の大尖塔 */
                linear-gradient(90deg, transparent 48%, #1c1437 48%, #1c1437 52%, transparent 52%),
                conic-gradient(from 150deg at 50% 0%, #1c1437 60deg, transparent 60deg),
                /* 左右の塔 */
                linear-gradient(90deg, transparent 35%, #160f2e 35%, #160f2e 42%, transparent 42%),
                linear-gradient(90deg, transparent 58%, #160f2e 58%, #160f2e 65%, transparent 65%),
                /* 城の壁ベース */
                linear-gradient(to top, #0f0a21 0%, #140d2b 80%, transparent 100%);
            background-size: 100% 100%, 60px 80px, 100% 100%, 100% 100%, 100% 100%;
            background-position: bottom center, center bottom 120px, bottom center, bottom center, bottom center;
            background-repeat: no-repeat;
            opacity: 0.4;
            z-index: -1;
            pointer-events: none;
        }

        /* 夜空のきらきら星 */
        body::after {
            content: "★ . * ★ . * . ★";
            position: fixed;
            top: 10%;
            left: 10%;
            width: 80%;
            height: 30%;
            color: rgba(255, 255, 255, 0.3);
            font-size: 1.5rem;
            word-spacing: 100px;
            letter-spacing: 50px;
            line-height: 80px;
            z-index: -1;
            pointer-events: none;
        }

        header {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            z-index: 10;
        }

        h1 {
            color: var(--accent-color);
            font-size: 1.8rem;
            margin: 0;
            text-shadow: 0 0 12px rgba(251, 210, 73, 0.4);
        }

        /* 時計 & タイマーエリア */
        .clock-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
            background: rgba(15, 20, 50, 0.6);
            padding: 20px;
            border-radius: 25px;
            width: 100%;
            max-width: 460px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* 改修：添付画像スタイルの美しいアナログ時計 */
        .analog-clock {
            width: 180px;
            height: 180px;
            border: 4px solid #ffffff;
            border-radius: 50%;
            position: relative;
            background: #ffffff;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        /* SVGを用いた正確なフチ沿い青塗りゲージ */
        .clock-svg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg); /* 12時位置をスタートにする */
            pointer-events: none;
            z-index: 2;
        }

        .clock-face {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 3;
        }

        .clock-number {
            position: absolute;
            width: 20px;
            height: 20px;
            text-align: center;
            font-weight: bold;
            color: #2c3e50;
            font-size: 1.1rem;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            background: #2c3e50;
            border-radius: 4px;
        }

        .hour-hand { width: 5px; height: 45px; margin-left: -2.5px; }
        .minute-hand { width: 3.5px; height: 65px; margin-left: -1.75px; background: #34495e; }
        .second-hand { width: 1.5px; height: 75px; margin-left: -0.75px; background: var(--danger-color); }
        .center-dot { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: #2c3e50; border-radius: 50%; transform: translate(-50%, -50%); }

        .timer-display {
            margin-top: 15px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #74b9ff;
            min-height: 1.5rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* ボタン */
        .btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        .edit-btn { background-color: #4a69bd; color: white; }
        .edit-btn.active { background-color: #e67e22; }
        
        /* できたボタンの形状を画像風にブラッシュアップ */
        .done-btn { 
            background: linear-gradient(135deg, #ff9f43 0%, #ff6b6b 100%); 
            color: white; 
            font-size: 1.1rem; 
            padding: 10px 22px; 
            border-radius: 25px; 
            min-width: 90px;
            box-shadow: 0 4px 10px rgba(255, 107, 107, 0.4);
        }
        .done-btn.completed { 
            background: linear-gradient(135deg, #2ed573 0%, #1e90ff 100%); 
            box-shadow: none;
        }
        .delete-btn { background-color: var(--danger-color); color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; border: none; cursor: pointer; }

        /* 編集パネル */
        .edit-panel {
            background: rgba(0, 0, 0, 0.6);
            border: 2px dashed #4a69bd;
            border-radius: 15px;
            padding: 15px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            display: none;
            box-sizing: border-box;
            z-index: 10;
        }
        .edit-panel.active { display: block; }
        .setting-group { margin-bottom: 12px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; font-size: 0.95rem; }
        .setting-group input[type="time"] { padding: 6px; border-radius: 5px; border: none; font-size: 1rem; }
        .checkbox-label { display: flex; align-items: center; gap: 6px; cursor: pointer; }

        /* 通常画面用のタスク追加エリア */
        .add-task-panel {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 15px;
            padding: 15px;
            width: 100%;
            max-width: 500px;
            margin-top: 20px;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
        }
        .add-task-title { font-size: 1rem; font-weight: bold; color: var(--accent-color); margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        .add-task-form { display: flex; gap: 10px; width: 100%; }
        .add-task-form select { padding: 10px; border-radius: 10px; border: none; font-size: 1.1rem; background: #fff; }
        .add-task-form input { flex: 1; padding: 10px; border-radius: 10px; border: none; font-size: 1rem; }
        .add-btn { background: linear-gradient(135deg, #2ecc71, #00d2d3); color: white; padding: 10px 20px; border-radius: 10px; font-weight: bold; }

        /* タスク一覧 */
        .task-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .task-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            border: 2px solid rgba(255,255,255,0.08);
            transition: all 0.3s ease;
        }

        .task-card.completed {
            border-color: rgba(251, 210, 73, 0.5);
            background: rgba(251, 210, 73, 0.1);
        }

        .task-info { display: flex; align-items: center; gap: 15px; }
        
        /* 完了時にプリンセスのティアラ👑アイコンに変身する箇所 */
        .task-icon-container {
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            transition: transform 0.3s ease;
        }
        .task-card.completed .task-icon-container {
            transform: scale(1.1);
        }

        .task-name { font-size: 1.3rem; font-weight: bold; transition: color 0.3s; }
        .task-card.completed .task-name { text-decoration: line-through; color: rgba(255,255,255,0.35); }

        /* ポップアップ */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .popup-content {
            background: linear-gradient(135deg, #ffeef8 0%, #f0e6ff 100%);
            padding: 25px; border-radius: 20px; text-align: center;
            max-width: 85%; max-height: 85vh; display: flex; flex-direction: column; align-items: center;
        }
        .popup-image { max-width: 100%; max-height: 50vh; object-fit: contain; border-radius: 10px; margin-bottom: 15px; }
        .popup-message { font-size: 1.6rem; font-weight: bold; color: #4a148c; margin-bottom: 15px; }
        .close-btn { background-color: #ff4081; color: white; border: none; padding: 10px 25px; border-radius: 20px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }

        .reset-btn { margin-top: 25px; background-color: rgba(255,255,255,0.12); color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; z-index: 10; }
    </style>
</head>
<body>

    <header>
        <h1>👑 おやすみのじゅんび</h1>
        <button class="btn edit-btn" id="editToggleBtn" 
                onclick="handleEditClick()" 
                onmousedown="startLongPress()" onmouseup="cancelLongPress()" onmouseleave="cancelLongPress()"
                onTouchStart="startLongPress(event)" onTouchEnd="cancelLongPress(event)">
            へんしゅう
        </button>
    </header>

    <div class="clock-container">
        <div class="analog-clock" id="analogClock">
            <svg class="clock-svg-overlay" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="44" stroke="transparent" stroke-width="8" fill="transparent" />
                <circle id="blueArc" cx="50" cy="50" r="44" stroke="var(--timer-blue)" stroke-width="8" fill="transparent" 
                        stroke-dasharray="276.4" stroke-dashoffset="276.4" stroke-linecap="round" />
            </svg>
            
            <div class="clock-face" id="clockFace">
                <div class="hand hour-hand" id="hourHand"></div>
                <div class="minute-hand hand" id="minuteHand"></div>
                <div class="second-hand hand" id="secondHand"></div>
                <div class="center-dot"></div>
            </div>
        </div>
        <div class="timer-display" id="timerDisplay"></div>
    </div>

    <div class="edit-panel" id="editPanel">
        <div class="setting-group">
            <label>⏰ <b>しゅうしんじこく:</b></label>
            <input type="time" id="bedTimeInput" value="21:00" onchange="saveSettings()">
        </div>
        
        <div id="alarmSettings" style="border-top: 1px dashed rgba(255,255,255,0.2); padding-top: 10px; margin-top: 10px;">
            <div class="setting-group">
                <b>🚨 アラームのおと設定:</b>
                <label class="checkbox-label">
                    <input type="checkbox" id="alarm5MinBefore" onchange="saveSettings()" checked> 5分前 (できた)
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="alarmOnTime" onchange="saveSettings()" checked> オンタイム (おやすみ)
                </label>
            </div>
        </div>
    </div>

    <div class="task-container" id="taskContainer"></div>

    <div class="add-task-panel">
        <div class="add-task-title">➕ 新しいタスクをあつめる</div>
        <div class="add-task-form">
            <select id="newTaskIcon">
                <option value="✨">✨</option><option value="🦷">🦷</option><option value="🛁">🛁</option>
                <option value="👕">👕</option><option value="🍱">🍱</option><option value="📖">📖</option>
                <option value="🧸">🧸</option><option value="🥛">🥛</option>
            </select>
            <input type="text" id="newTaskName" placeholder="なにをする？">
            <button class="btn add-btn" onclick="addNewTask()">ついか</button>
        </div>
    </div>

    <button class="reset-btn" onclick="resetTasks()">ぜんぶ最初からやりなおす</button>

    <div class="overlay" id="overlay" onclick="closePopup()">
        <div class="popup-content" onclick="event.stopPropagation()">
            <img src="" alt="ごほうび" class="popup-image" id="popupImage">
            <div class="popup-message" id="popupMessage">できた！</div>
            <button class="close-btn" onclick="closePopup()">つぎへ</button>
        </div>
    </div>

    <audio id="audioDone" src="できた.wav" preload="auto"></audio>
    <audio id="audioGoodNight" src="おやすみなさい.wav" preload="auto"></audio>

    <script>
        let tasks = [
            { id: 1, name: 'ごはんを たべる', icon: '🍱', completed: false },
            { id: 2, name: 'おふろに はいる', icon: '🛁', completed: false },
            { id: 3, name: 'トイレに いく', icon: '🚽', completed: false },
            { id: 4, name: 'はを みがく', icon: '🪥', completed: false },
            { id: 5, name: 'パジャマを きる', icon: '👕', completed: false }
        ];

        const images = ['ジャスミン.png', 'ベル.png', 'アリエル.png', 'オーロラ姫.png', 'シンデレラ.png', '白雪姫.png'];
        let isEditMode = false;
        let bedTime = "21:00";
        let longPressTimer;
        let isLongPressed = false;

        let alarm5Fired = false;
        let alarmOnTimeFired = false;

        if(localStorage.getItem('bedTime')) bedTime = localStorage.getItem('bedTime');
        if(localStorage.getItem('bedTasks')) tasks = JSON.parse(localStorage.getItem('bedTasks'));

        window.onload = function() {
            createClockNumbers();
            if(localStorage.getItem('alarm5MinBefore')) {
                document.getElementById('alarm5MinBefore').checked = localStorage.getItem('alarm5MinBefore') === 'true';
            }
            if(localStorage.getItem('alarmOnTime')) {
                document.getElementById('alarmOnTime').checked = localStorage.getItem('alarmOnTime') === 'true';
            }
            document.getElementById('bedTimeInput').value = bedTime;
            renderTasks();
            setInterval(updateClock, 1000);
            updateClock();
        };

        function createClockNumbers() {
            const face = document.getElementById('clockFace');
            const radius = 70; 
            for (let i = 1; i <= 12; i++) {
                const angle = (i * 30) * (Math.PI / 180);
                const x = 90 + radius * Math.sin(angle) - 10;
                const y = 90 - radius * Math.cos(angle) - 10;
                const numDiv = document.createElement('div');
                numDiv.className = 'clock-number';
                numDiv.innerText = i;
                numDiv.style.left = `${x}px`;
                numDiv.style.top = `${y}px`;
                face.appendChild(numDiv);
            }
        }

        // 変更：完了時にアイコンをプリンセスの「ティアラ👑」に変化させるロジック
        function renderTasks() {
            const container = document.getElementById('taskContainer');
            container.innerHTML = '';

            tasks.forEach(task => {
                const card = document.createElement('div');
                card.className = `task-card ${task.completed ? 'completed' : ''}`;
                const buttonText = task.completed ? 'もどす' : 'できた';
                
                // 完了状態なら「👑」、未完了なら元の絵文字を表示
                const currentIcon = task.completed ? '👑' : task.icon;

                card.innerHTML = `
                    <div class="task-info">
                        <div class="task-icon-container">${currentIcon}</div>
                        <span class="task-name">${task.name}</span>
                    </div>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        ${isEditMode ? `<button class="delete-btn" onclick="deleteTask(${task.id})">さくじょ</button>` : ''}
                        <button class="btn done-btn ${task.completed ? 'completed' : ''}" onclick="toggleTask(${task.id})">${buttonText}</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;

            task.completed = !task.completed;
            saveSettings();
            renderTasks();

            if (task.completed) {
                const allDone = tasks.every(t => t.completed);
                if (allDone) {
                    playAudio('audioGoodNight');
                    showPopup(true);
                } else {
                    playAudio('audioDone');
                    showPopup(false);
                }
            }
        }

        function playAudio(elementId) {
            const audio = document.getElementById(elementId);
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(e => console.log("Audio block active"));
            }
        }

        // 改修：添付画像と同じ「フチ沿い青塗り」の計算処理
        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();

            const hourDeg = (hours % 12) * 30 + minutes * 0.5;
            const minuteDeg = minutes * 6;
            const secondDeg = seconds * 6;

            document.getElementById('hourHand').style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;
            document.getElementById('minuteHand').style.transform = `translateX(-50%) rotate(${minuteDeg}deg)`;
            document.getElementById('secondHand').style.transform = `translateX(-50%) rotate(${secondDeg}deg)`;

            const [bedH, bedM] = bedTime.split(':').map(Number);
            let bedDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), bedH, bedM, 0);
            if (bedDate < now && now - bedDate > 0) {
                bedDate.setDate(bedDate.getDate() + 1);
            }

            const diffMs = bedDate - now;
            const diffMin = Math.ceil(diffMs / 1000 / 60);
            const totalSec = Math.floor(diffMs / 1000);

            const timerDisplay = document.getElementById('timerDisplay');
            const blueArc = document.getElementById('blueArc');

            // アラーム処理
            const useAlarm5 = document.getElementById('alarm5MinBefore').checked;
            const useAlarmOnTime = document.getElementById('alarmOnTime').checked;
            if (useAlarm5 && totalSec <= 300 && totalSec > 297 && !alarm5Fired) {
                playAudio('audioDone'); alarm5Fired = true;
            }
            if (useAlarmOnTime && totalSec <= 0 && totalSec > -3 && !alarmOnTimeFired) {
                playAudio('audioGoodNight'); alarmOnTimeFired = true;
            }
            if (totalSec > 305) { alarm5Fired = false; alarmOnTimeFired = false; }

            // フチ塗りゲージの制御（最大30分間＝時計盤のちょうど「半分」の長さ 138.2 px）
            // 全周の長さ = 2 * PI * r(44) = 276.4
            if (diffMs > 0 && diffMin <= 30) {
                const min = Math.floor(totalSec / 60);
                const sec = totalSec % 60;
                timerDisplay.innerText = `ねる時間まで あと ${min}分 ${sec.toString().padStart(2, '0')}秒`;

                // 残り時間（最大1800秒）に応じたメーターの長さを計算
                // 30分前時点で最大（半周分の長さ＝138.2）、0秒に向けて減っていく
                const maxArcLength = 138.2; 
                const currentArcLength = (totalSec / 1800) * maxArcLength;
                
                // SVGのダッシュオフセットを変化させることでフチに沿って伸縮
                blueArc.style.strokeDashoffset = 276.4 - currentArcLength;
                
                // 現在の分針の位置（角度）に合わせて、青いゲージの開始地点を動的に回転させる
                const currentMinutesInClock = minutes + (seconds / 60);
                const startAngle = currentMinutesInClock * 6;
                document.getElementById('clockPie')?.setAttribute('transform', `rotate(${startAngle} 50 50)`);
                
                // 今回はシンプルに、添付画像のように12時方向（または現在地）からキレイにフチへ乗るよう調整
                // 現在の分針の位置に青ゲージを同期させるためSVGごと回転させます
                const svgOverlay = document.querySelector('.clock-svg-overlay');
                svgOverlay.style.transform = `rotate(${startAngle - 90}deg)`;

            } else {
                timerDisplay.innerText = '';
                blueArc.style.strokeDashoffset = 276.4; // 30分前以外は非表示
            }
        }

        function startLongPress(e) {
            isLongPressed = false;
            longPressTimer = setTimeout(() => {
                isLongPressed = true;
                triggerLongPressAction();
            }, 1000);
        }

        function cancelLongPress(e) { clearTimeout(longPressTimer); }

        function triggerLongPressAction() {
            const panel = document.getElementById('editPanel');
            isEditMode = true;
            document.getElementById('editToggleBtn').innerText = "おわる";
            document.getElementById('editToggleBtn').classList.add('active');
            panel.classList.add('active');
            renderTasks();
        }

        function handleEditClick() {
            if (isLongPressed) { isLongPressed = false; return; }
            isEditMode = !isEditMode;
            const btn = document.getElementById('editToggleBtn');
            const panel = document.getElementById('editPanel');
            
            if(isEditMode) {
                btn.innerText = "おわる";
                btn.classList.add('active');
                panel.classList.add('active');
            } else {
                btn.innerText = "へんしゅう";
                btn.classList.remove('active');
                panel.classList.remove('active');
            }
            renderTasks();
        }

        function addNewTask() {
            const nameInput = document.getElementById('newTaskName');
            const iconInput = document.getElementById('newTaskIcon');
            if(!nameInput.value.trim()) return;

            const newId = tasks.length > 0 ? Math.max(...tasks.map(t => t.id)) + 1 : 1;
            tasks.push({
                id: newId,
                name: nameInput.value,
                icon: iconInput.value,
                completed: false
            });

            nameInput.value = '';
            saveSettings();
            renderTasks();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveSettings();
            renderTasks();
        }

        function showPopup(isAllCompleted) {
            const overlay = document.getElementById('overlay');
            const popupImage = document.getElementById('popupImage');
            const popupMessage = document.getElementById('popupMessage');

            const randomIndex = Math.floor(Math.random() * images.length);
            popupImage.src = images[randomIndex];

            if (isAllCompleted) {
                popupMessage.innerHTML = '✨ ぜんぶ できたね！ ✨<br>おやすみなさい 🌙';
            } else {
                popupMessage.innerText = 'できた！ 👏';
            }
            overlay.classList.add('active');
        }

        document.getElementById('overlay').onclick = closePopup;
        function closePopup() { document.getElementById('overlay').classList.remove('active'); }

        function saveSettings() {
            bedTime = document.getElementById('bedTimeInput').value;
            localStorage.setItem('bedTime', bedTime);
            localStorage.setItem('bedTasks', JSON.stringify(tasks));
            localStorage.setItem('alarm5MinBefore', document.getElementById('alarm5MinBefore').checked);
            localStorage.setItem('alarmOnTime', document.getElementById('alarmOnTime').checked);
        }

        function resetTasks() {
            tasks.forEach(t => t.completed = false);
            alarm5Fired = false;
            alarmOnTimeFired = false;
            saveSettings();
            renderTasks();
            closePopup();
        }
    </script>
</body>
</html>
